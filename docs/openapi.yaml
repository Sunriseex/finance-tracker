openapi: 3.0.3
info:
  title: CapitalFlow API
  version: 0.5.0
servers:
  - url: http://localhost:8080/api/v1
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Profile
  - name: Categories
  - name: Currencies
  - name: Accounts
  - name: Transactions
  - name: Transfers
  - name: Interest Rules
  - name: Dashboard
paths:
  /auth/status:
    servers:
      - url: http://localhost:8080
    get:
      tags: [Auth]
      summary: Check whether initial setup is required
      security: []
      responses:
        "200":
          description: Auth setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatusResponse"
        default:
          $ref: "#/components/responses/APIError"
  /auth/setup:
    servers:
      - url: http://localhost:8080
    post:
      tags: [Auth]
      summary: Create the first user and start a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthSetupRequest"
      responses:
        "201":
          description: Created session
          headers:
            Set-Cookie:
              description: HttpOnly refresh-token cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        default:
          $ref: "#/components/responses/APIError"
  /auth/login:
    servers:
      - url: http://localhost:8080
    post:
      tags: [Auth]
      summary: Start a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Started session
          headers:
            Set-Cookie:
              description: HttpOnly refresh-token cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        default:
          $ref: "#/components/responses/APIError"
  /auth/refresh:
    servers:
      - url: http://localhost:8080
    post:
      tags: [Auth]
      summary: Refresh access token using the HttpOnly refresh cookie
      security: []
      responses:
        "200":
          description: Refreshed session
          headers:
            Set-Cookie:
              description: Rotated HttpOnly refresh-token cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        default:
          $ref: "#/components/responses/APIError"
  /auth/logout:
    servers:
      - url: http://localhost:8080
    post:
      tags: [Auth]
      summary: Revoke the current refresh-token cookie session
      security: []
      responses:
        "204":
          description: Logged out
          headers:
            Set-Cookie:
              description: Expired refresh-token cookie.
              schema:
                type: string
        default:
          $ref: "#/components/responses/APIError"
  /settings/profile:
    get:
      tags: [Profile]
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        default:
          $ref: "#/components/responses/APIError"
    patch:
      tags: [Profile]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        default:
          $ref: "#/components/responses/APIError"
  /auth/password:
    post:
      tags: [Auth]
      summary: Change current user password and revoke existing sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password changed
        default:
          $ref: "#/components/responses/APIError"
  /auth/sessions:
    get:
      tags: [Auth]
      summary: List current user sessions
      responses:
        "200":
          description: User sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionsResponse"
        default:
          $ref: "#/components/responses/APIError"
  /auth/sessions/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    delete:
      tags: [Auth]
      summary: Revoke a user session
      responses:
        "204":
          description: Session revoked
        default:
          $ref: "#/components/responses/APIError"
  /categories:
    get:
      tags: [Categories]
      summary: List categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
        default:
          $ref: "#/components/responses/APIError"
  /currency-rates:
    get:
      tags: [Currencies]
      summary: Latest exchange rates for a base currency
      parameters:
        - name: base
          in: query
          schema:
            type: string
            minLength: 3
            maxLength: 3
            default: RUB
      responses:
        "200":
          description: Exchange rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrencyRateTable"
        default:
          $ref: "#/components/responses/APIError"
  /accounts:
    get:
      tags: [Accounts]
      summary: List accounts
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
        default:
          $ref: "#/components/responses/APIError"
    post:
      tags: [Accounts]
      summary: Create account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: Created account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        default:
          $ref: "#/components/responses/APIError"
  /accounts/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Accounts]
      summary: Get account
      responses:
        "200":
          description: Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        default:
          $ref: "#/components/responses/APIError"
    patch:
      tags: [Accounts]
      summary: Update account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        default:
          $ref: "#/components/responses/APIError"
  /accounts/{id}/archive:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Accounts]
      summary: Archive account
      responses:
        "204":
          description: Archived account
        default:
          $ref: "#/components/responses/APIError"
  /accounts/{id}/balance:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Accounts]
      summary: Get account balance
      responses:
        "200":
          description: Account balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBalance"
        default:
          $ref: "#/components/responses/APIError"
  /transactions:
    get:
      tags: [Transactions]
      summary: List transactions
      parameters:
        - name: account_id
          in: query
          schema:
            type: string
            format: uuid
        - name: category_id
          in: query
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/TransactionType"
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        default:
          $ref: "#/components/responses/APIError"
    post:
      tags: [Transactions]
      summary: Create transaction
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
      responses:
        "201":
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        default:
          $ref: "#/components/responses/APIError"
  /transactions/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Transactions]
      summary: Get transaction
      responses:
        "200":
          description: Transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        default:
          $ref: "#/components/responses/APIError"
    delete:
      tags: [Transactions]
      summary: Delete transaction
      responses:
        "204":
          description: Deleted
        default:
          $ref: "#/components/responses/APIError"
  /transfers:
    post:
      tags: [Transfers]
      summary: Create transfer
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransferRequest"
      responses:
        "201":
          description: Created transfer pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferResponse"
        default:
          $ref: "#/components/responses/APIError"
  /accounts/{id}/interest-rules:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Interest Rules]
      summary: List account interest rules
      responses:
        "200":
          description: Interest rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InterestRule"
        default:
          $ref: "#/components/responses/APIError"
    post:
      tags: [Interest Rules]
      summary: Create interest rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInterestRuleRequest"
      responses:
        "201":
          description: Created interest rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterestRule"
        default:
          $ref: "#/components/responses/APIError"
  /interest-rules/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    patch:
      tags: [Interest Rules]
      summary: Update interest rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInterestRuleRequest"
      responses:
        "200":
          description: Updated interest rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterestRule"
        default:
          $ref: "#/components/responses/APIError"
  /accounts/{id}/accrue-interest:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Interest Rules]
      summary: Accrue interest for one day
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccrueInterestRequest"
      responses:
        "201":
          description: Created interest accrual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccrueInterestResponse"
        "200":
          description: Accrual skipped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccrueInterestSkippedResponse"
        default:
          $ref: "#/components/responses/APIError"
  /accounts/{id}/recalculate-interest:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Interest Rules]
      summary: Replace and recalculate daily interest accruals
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecalculateInterestRequest"
      responses:
        "200":
          description: Recalculation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecalculateInterestResponse"
        default:
          $ref: "#/components/responses/APIError"
  /dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        default:
          $ref: "#/components/responses/APIError"
  /dashboard/net-worth:
    get:
      tags: [Dashboard]
      summary: Net worth snapshot
      responses:
        "200":
          description: Net worth
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardNetWorth"
        default:
          $ref: "#/components/responses/APIError"
  /dashboard/cashflow:
    get:
      tags: [Dashboard]
      summary: Monthly cashflow buckets
      parameters:
        - $ref: "#/components/parameters/Months"
      responses:
        "200":
          description: Cashflow buckets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardCashflow"
        default:
          $ref: "#/components/responses/APIError"
  /dashboard/interest-income:
    get:
      tags: [Dashboard]
      summary: Monthly interest income buckets
      parameters:
        - $ref: "#/components/parameters/Months"
      responses:
        "200":
          description: Interest income buckets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardInterestIncome"
        default:
          $ref: "#/components/responses/APIError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Months:
      name: months
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 60
        default: 6
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Unique key for safely retrying this mutation.
      schema:
        type: string
        minLength: 1
        maxLength: 255
  responses:
    APIError:
      description: API error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: validation_error
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    AuthUser:
      type: object
      required: [id, email, primary_currency]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        primary_currency:
          type: string
          minLength: 3
          maxLength: 3
    AuthSetupRequest:
      type: object
      required: [email, password, primary_currency]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        primary_currency:
          type: string
          minLength: 3
          maxLength: 3
    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
    AuthResponse:
      type: object
      required: [user, access_token, access_expires_at]
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        access_token:
          type: string
        access_expires_at:
          type: string
          format: date-time
    AuthStatusResponse:
      type: object
      required: [setup_required]
      properties:
        setup_required:
          type: boolean
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          minLength: 1
        new_password:
          type: string
          minLength: 1
    AuthSessionInfo:
      type: object
      required: [id, expires_at, created_at, active, current]
      properties:
        id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        active:
          type: boolean
        current:
          type: boolean
    AuthSessionsResponse:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/AuthSessionInfo"
    Profile:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
    UpdateProfileRequest:
      type: object
      required: [primary_currency]
      properties:
        primary_currency:
          type: string
          minLength: 3
          maxLength: 3
    AccountType:
      type: string
      enum: [cash, card, savings, term_deposit, broker, other]
    TransactionType:
      type: string
      enum: [initial_balance, income, expense, transfer_in, transfer_out, interest_income, adjustment]
    AccrualFrequency:
      type: string
      enum: [daily, monthly, end_of_term]
    CapitalizationFrequency:
      type: string
      enum: [none, daily, monthly, end_of_term]
    DayCountConvention:
      type: string
      enum: [actual_365, actual_366, actual_actual]
    Amount:
      type: object
      required: [currency, amount_minor]
      properties:
        currency:
          type: string
          minLength: 3
          maxLength: 3
        amount_minor:
          type: integer
          format: int64
    Account:
      type: object
      required: [id, name, type, currency, is_active, opened_at, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        legacy_id:
          type: string
          nullable: true
        name:
          type: string
        bank:
          type: string
        type:
          $ref: "#/components/schemas/AccountType"
        currency:
          type: string
        is_active:
          type: boolean
        opened_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateAccountRequest:
      type: object
      required: [name, bank, type, currency, opened_at]
      properties:
        name:
          type: string
        bank:
          type: string
        type:
          $ref: "#/components/schemas/AccountType"
        currency:
          type: string
        opened_at:
          type: string
          format: date
    UpdateAccountRequest:
      type: object
      properties:
        name:
          type: string
        bank:
          type: string
        type:
          $ref: "#/components/schemas/AccountType"
        currency:
          type: string
        opened_at:
          type: string
          format: date
        is_active:
          type: boolean
    AccountBalance:
      type: object
      required: [account_id, balance_minor, transaction_count]
      properties:
        account_id:
          type: string
          format: uuid
        balance_minor:
          type: integer
          format: int64
        transaction_count:
          type: integer
    Category:
      type: object
      required: [id, slug, name, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Transaction:
      type: object
      required: [id, account_id, type, amount_minor, occurred_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        related_account_id:
          type: string
          format: uuid
          nullable: true
        transfer_id:
          type: string
          format: uuid
          nullable: true
        type:
          $ref: "#/components/schemas/TransactionType"
        amount_minor:
          type: integer
          format: int64
        category_id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
        occurred_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    CreateTransactionRequest:
      type: object
      required: [account_id, type, amount_minor, description, occurred_at]
      properties:
        account_id:
          type: string
          format: uuid
        related_account_id:
          type: string
          format: uuid
          nullable: true
        type:
          $ref: "#/components/schemas/TransactionType"
        amount_minor:
          type: integer
          format: int64
        category_id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
        occurred_at:
          type: string
          format: date
    CreateTransferRequest:
      type: object
      required: [from_account_id, to_account_id, amount_minor, description]
      properties:
        from_account_id:
          type: string
          format: uuid
        to_account_id:
          type: string
          format: uuid
        amount_minor:
          type: integer
          format: int64
        description:
          type: string
    TransferResponse:
      type: object
      required: [out, in, exchange_rate]
      properties:
        out:
          $ref: "#/components/schemas/Transaction"
        in:
          $ref: "#/components/schemas/Transaction"
        exchange_rate:
          type: string
          description: Rate used to convert out amount into in amount.
    CurrencyRateTable:
      type: object
      required: [base, date, provider, fetched_at, rates]
      properties:
        base:
          type: string
        date:
          type: string
        provider:
          type: string
        fetched_at:
          type: string
          format: date-time
        rates:
          type: object
          additionalProperties:
            type: number
            format: double
    InterestRule:
      type: object
      required:
        - id
        - account_id
        - annual_rate_bps
        - accrual_frequency
        - capitalization_frequency
        - day_count_convention
        - is_active
        - start_date
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        annual_rate_bps:
          type: integer
          format: int64
        promo_rate_bps:
          type: integer
          format: int64
          nullable: true
        promo_end_date:
          type: string
          format: date-time
          nullable: true
        accrual_frequency:
          $ref: "#/components/schemas/AccrualFrequency"
        capitalization_frequency:
          $ref: "#/components/schemas/CapitalizationFrequency"
        day_count_convention:
          $ref: "#/components/schemas/DayCountConvention"
        is_active:
          type: boolean
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
          nullable: true
    CreateInterestRuleRequest:
      type: object
      required: [annual_rate_bps, accrual_frequency, capitalization_frequency, day_count_convention, start_date]
      properties:
        annual_rate_bps:
          type: integer
          format: int64
        promo_rate_bps:
          type: integer
          format: int64
          nullable: true
        promo_end_date:
          type: string
          format: date
          nullable: true
        accrual_frequency:
          $ref: "#/components/schemas/AccrualFrequency"
        capitalization_frequency:
          $ref: "#/components/schemas/CapitalizationFrequency"
        day_count_convention:
          $ref: "#/components/schemas/DayCountConvention"
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
